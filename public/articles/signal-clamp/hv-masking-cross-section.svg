<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 486" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="soil2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7dac0"/>
      <stop offset="1" stop-color="#bfa97f"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2933" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1f2933" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- title -->
  <text x="30" y="26" font-size="16.5" font-weight="700" fill="#1c2a6e">Cross-section of a footpath: how a deep HV cable gets masked</text>
  <text x="30" y="45" font-size="12" fill="#5b6770">Induction radiates from the surface and lights up the shallow services. The deeper HV is screened by the cable above it.</text>

  <!-- soil + surface -->
  <rect x="60" y="98" width="676" height="358" fill="url(#soil2)"/>
  <rect x="60" y="86" width="676" height="12" fill="#cfd4d8"/>
  <g stroke="#aab0b6" stroke-width="1">
    <line x1="150" y1="86" x2="150" y2="98"/><line x1="240" y1="86" x2="240" y2="98"/>
    <line x1="330" y1="86" x2="330" y2="98"/><line x1="420" y1="86" x2="420" y2="98"/>
    <line x1="510" y1="86" x2="510" y2="98"/><line x1="600" y1="86" x2="600" y2="98"/>
    <line x1="690" y1="86" x2="690" y2="98"/>
  </g>

  <!-- depth axis -->
  <line x1="60" y1="98" x2="60" y2="450" stroke="#8a929b" stroke-width="1"/>
  <g font-size="10.5" fill="#5b6770" text-anchor="end">
    <line x1="56" y1="98" x2="60" y2="98" stroke="#8a929b"/><text x="52" y="101">0</text>
    <line x1="56" y1="186" x2="60" y2="186" stroke="#8a929b"/><text x="52" y="189">250mm</text>
    <line x1="56" y1="274" x2="60" y2="274" stroke="#8a929b"/><text x="52" y="277">500mm</text>
    <line x1="56" y1="362" x2="60" y2="362" stroke="#8a929b"/><text x="52" y="365">750mm</text>
    <line x1="56" y1="450" x2="60" y2="450" stroke="#8a929b"/><text x="52" y="453">1000mm</text>
  </g>

  <!-- Genny on surface -->
  <text x="342" y="60" font-size="11" font-weight="600" fill="#1f2933" text-anchor="middle">Genny (induction, 33 kHz)</text>
  <rect x="320" y="64" width="44" height="22" rx="3" fill="#f2c200" stroke="#9a7d00" stroke-width="1.2"/>
  <rect x="328" y="69" width="28" height="9" rx="1.5" fill="#33373b"/>

  <!-- induction arcs radiating down over the shallow cables -->
  <g fill="none" stroke="#e1251b" stroke-width="1.6" stroke-dasharray="5 5">
    <path d="M 272 86 A 70 70 0 0 0 412 86" stroke-opacity="0.5"/>
    <path d="M 222 86 A 120 120 0 0 0 462 86" stroke-opacity="0.38"/>
    <path d="M 167 86 A 175 165 0 0 0 517 86" stroke-opacity="0.26"/>
    <path d="M 112 86 A 230 200 0 0 0 572 86" stroke-opacity="0.16"/>
  </g>

  <!-- masking shadow beneath the LV cable, over the HV -->
  <path d="M 416 290 L 474 290 L 548 450 L 404 450 Z" fill="url(#shadow)"/>

  <!-- Comms (shallow) -->
  <circle cx="300" cy="186" r="9" fill="#6b7280" stroke="#fff" stroke-width="1.5"/>
  <circle cx="300" cy="186" r="15" fill="none" stroke="#7ac143" stroke-width="2.2" stroke-opacity="0.75"/>
  <text x="300" y="164" font-size="11" fill="#1f2933" text-anchor="middle">Comms</text>

  <!-- Gas (mid) -->
  <circle cx="565" cy="232" r="9" fill="#eab308" stroke="#fff" stroke-width="1.5"/>
  <circle cx="565" cy="232" r="15" fill="none" stroke="#7ac143" stroke-width="2.2" stroke-opacity="0.75"/>
  <text x="565" y="210" font-size="11" fill="#1f2933" text-anchor="middle">Gas</text>

  <!-- Water (mid) -->
  <circle cx="352" cy="256" r="9" fill="#2563eb" stroke="#fff" stroke-width="1.5"/>
  <circle cx="352" cy="256" r="15" fill="none" stroke="#7ac143" stroke-width="2.2" stroke-opacity="0.75"/>
  <text x="333" y="259" font-size="11" fill="#1f2933" text-anchor="end">Water</text>

  <!-- LV electric (shallower cable that masks the HV) -->
  <circle cx="445" cy="281" r="10" fill="#dc2626" stroke="#fff" stroke-width="1.5"/>
  <circle cx="445" cy="281" r="16" fill="none" stroke="#7ac143" stroke-width="2.2" stroke-opacity="0.75"/>
  <text x="467" y="278" font-size="11" fill="#1f2933" text-anchor="start">LV electric</text>

  <!-- HV electric (deep, armoured, masked) -->
  <circle cx="478" cy="432" r="16" fill="#7f1d1d" stroke="#b91c1c" stroke-width="3"/>
  <circle cx="478" cy="432" r="9" fill="#dc2626"/>
  <circle cx="478" cy="432" r="27" fill="none" stroke="#8a929b" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="512" y="429" font-size="12.5" font-weight="700" fill="#7f1d1d" text-anchor="start">HV (deep)</text>
  <text x="512" y="446" font-size="10.5" fill="#5b6770" text-anchor="start">little or no induction signal</text>

  <!-- masking leader + annotation -->
  <line x1="445" y1="297" x2="470" y2="408" stroke="#5b6770" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="86" y="320" width="306" height="64" rx="7" fill="#ffffff" fill-opacity="0.74" stroke="#cdd8f0" stroke-width="1"/>
  <text x="100" y="340" font-size="11.5" fill="#1f2933">The LV cable sits above the HV and slightly to</text>
  <text x="100" y="356" font-size="11.5" fill="#1f2933">one side, screening it from the signal. A deep</text>
  <text x="100" y="372" font-size="11.5" fill="#1f2933">HV can be missed entirely.</text>

  <!-- legend -->
  <g font-size="10.5" fill="#5b6770">
    <circle cx="430" cy="472" r="7" fill="none" stroke="#7ac143" stroke-width="2.2"/>
    <text x="442" y="475" text-anchor="start">picks up the induction signal</text>
    <circle cx="636" cy="472" r="7" fill="none" stroke="#8a929b" stroke-width="1.6" stroke-dasharray="3 3"/>
    <text x="648" y="475" text-anchor="start">masked</text>
  </g>
</svg>

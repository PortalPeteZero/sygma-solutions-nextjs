name: Deploy send-contact-email

# Auto-deploys the send-contact-email Supabase edge function whenever its source
# changes on main. This is what makes "push = live" true — editing the function
# in the repo and pushing updates the LIVE function. Vercel does not build or
# deploy supabase/ (it is excluded from tsconfig); this workflow owns that.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/send-contact-email/**'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy function
        run: supabase functions deploy send-contact-email --project-ref mwkpgzjcpltdcdgotryv --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
